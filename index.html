<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <script>
        const savedTheme = localStorage.getItem('digital-clock-theme');
        if (savedTheme) {
            document.documentElement.dataset.theme = savedTheme;
        }
    </script>
    <!-- Importing a digital-style font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main-container">
        <!-- Day of the Week Display -->
        <div class="days-bar">
            <span id="day-0">SUNDAY</span>
            <span id="day-1">MONDAY</span>
            <span id="day-2">TUESDAY</span>
            <span id="day-3">WEDNESDAY</span>
            <span id="day-4">THURSDAY</span>
            <span id="day-5">FRIDAY</span>
            <span id="day-6">SATURDAY</span>
        </div>

        <div class="clock-wrapper">
            <!-- The Time Display -->
            <div id="clock" class="clock-display">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
            </div>

            <!-- AM/PM Indicator -->
            <div class="ampm-indicator">
                <div id="am">AM</div>
                <div id="pm">PM</div>
            </div>
        </div>

        <!-- Date Display -->
        <div id="date-display" class="date-display">MAY 22 2026</div>

        <!-- Controls -->
        <div class="controls">
            <button id="toggle-format" class="btn">SWITCH TO 24H</button>
        </div>

        <div id="theme-menu" class="theme-menu" hidden aria-hidden="true">
            <div class="theme-menu__panel" role="dialog" aria-modal="true" aria-labelledby="theme-menu-title">
                <div class="theme-menu__header">
                    <h2 id="theme-menu-title">THEMES</h2>
                    <button id="close-theme-menu" class="theme-menu__close" type="button" aria-label="Close theme menu">×</button>
                </div>

                <div class="theme-menu__grid">
                    <button class="theme-option" type="button" data-theme-choice="midnight">MIDNIGHT</button>
                    <button class="theme-option" type="button" data-theme-choice="ice">ICE</button>
                    <button class="theme-option" type="button" data-theme-choice="violet">VIOLET</button>
                    <button class="theme-option" type="button" data-theme-choice="ember">EMBER</button>
                </div>

                <p class="theme-menu__hint">Press Esc to close.</p>
            </div>
        </div>
    </div>
</body>
</html>
